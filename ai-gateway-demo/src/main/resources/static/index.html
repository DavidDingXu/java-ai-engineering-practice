<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模型网关 Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --green:#047857; }
    * { box-sizing:border-box; } body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1120px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    .grid { display:grid; grid-template-columns:340px 1fr; gap:16px; align-items:start; }
    label { display:grid; gap:6px; margin-bottom:10px; font-size:13px; color:var(--muted); }
    input, textarea { border:1px solid var(--line); border-radius:6px; padding:9px 10px; font:inherit; }
    textarea { min-height:130px; resize:vertical; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; }
    .reply { min-height:150px; white-space:pre-wrap; line-height:1.8; border:1px solid var(--line); border-radius:8px; padding:14px; background:#fbfdff; }
    .metrics { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:10px; margin-top:12px; }
    .metric { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fff; overflow-wrap:anywhere; }
    .metric span { display:block; color:var(--muted); font-size:12px; margin-bottom:4px; }
    @media (max-width:820px) { .grid { grid-template-columns:1fr; } .metrics { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>模型网关</h1>
    <p>页面调用 <code>/api/ai/chat</code>，观察网关统一封装后的模型回复、Trace ID 和耗时，不让前端直接依赖模型厂商接口。</p>
  </header>

  <div class="grid">
    <section>
      <h2>工单输入</h2>
      <label>userId <input id="userId" value="u1001"></label>
      <label>message <textarea id="message">客户申请退款，但订单已经发货。</textarea></label>
      <button id="sendBtn">请求模型网关</button>
    </section>

    <section>
      <h2>网关响应</h2>
      <div id="reply" class="reply"></div>
      <div class="metrics">
        <div class="metric"><span>Trace</span><strong id="traceId">-</strong></div>
        <div class="metric"><span>Model</span><strong id="model">-</strong></div>
        <div class="metric"><span>Latency</span><strong id="latency">-</strong></div>
      </div>
    </section>
  </div>
</main>

<script>
  async function send() {
    document.querySelector('#reply').textContent = '请求中...';
    try {
      const response = await fetch('/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: document.querySelector('#userId').value,
          message: document.querySelector('#message').value
        })
      });
      if (!response.ok) throw new Error(await response.text());
      const data = await response.json();
      document.querySelector('#reply').textContent = data.content;
      document.querySelector('#traceId').textContent = data.traceId;
      document.querySelector('#model').textContent = data.model;
      document.querySelector('#latency').textContent = `${data.latencyMs} ms`;
    } catch (error) {
      document.querySelector('#reply').textContent = error.message;
    }
  }
  document.querySelector('#sendBtn').addEventListener('click', send);
</script>
</body>
</html>
