<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --green:#047857; }
    * { box-sizing:border-box; } body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1120px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    .grid { display:grid; grid-template-columns:320px 1fr; gap:16px; align-items:start; }
    label { display:grid; gap:6px; margin-bottom:10px; font-size:13px; color:var(--muted); }
    input, textarea { border:1px solid var(--line); border-radius:6px; padding:9px 10px; font:inherit; }
    textarea { min-height:86px; resize:vertical; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; }
    .answer { white-space:pre-wrap; line-height:1.8; border:1px solid var(--line); border-radius:8px; padding:14px; background:#fbfdff; min-height:130px; }
    .citations { display:grid; gap:10px; margin-top:12px; }
    .citation { border-left:4px solid var(--green); background:#f8fafc; border-radius:6px; padding:10px; }
    .citation strong { display:block; margin-bottom:4px; }
    @media (max-width:820px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>RAG 知识库问答</h1>
    <p>页面调用 <code>/api/rag/answer</code>，把回答和证据引用分开展示，方便观察权限过滤和引用返回。</p>
  </header>

  <div class="grid">
    <section>
      <h2>问题</h2>
      <label>租户 <input id="tenantId" value="tenant-a"></label>
      <label>部门 <input id="department" value="support"></label>
      <label>query <textarea id="query">客户申请退款但订单已发货怎么办</textarea></label>
      <button id="askBtn">检索并回答</button>
    </section>

    <section>
      <h2>回答与证据引用</h2>
      <div id="answer" class="answer"></div>
      <div id="citations" class="citations"></div>
    </section>
  </div>
</main>

<script>
  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  async function ask() {
    const answer = document.querySelector('#answer');
    const citations = document.querySelector('#citations');
    answer.textContent = '检索中...';
    citations.textContent = '';
    const body = {
      query: document.querySelector('#query').value,
      tenantId: document.querySelector('#tenantId').value,
      department: document.querySelector('#department').value
    };
    try {
      const response = await fetch('/api/rag/answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!response.ok) throw new Error(await response.text());
      const data = await response.json();
      answer.textContent = data.content;
      citations.innerHTML = (data.citations || []).map(item => `
        <div class="citation">
          <strong>${escapeHtml(item.documentId)} / ${escapeHtml(item.chunkId)}</strong>
          <span>${escapeHtml(item.quote)}</span>
        </div>
      `).join('') || '<div class="citation">没有返回可引用证据</div>';
    } catch (error) {
      answer.textContent = error.message;
    }
  }

  document.querySelector('#askBtn').addEventListener('click', ask);
  ask();
</script>
</body>
</html>
