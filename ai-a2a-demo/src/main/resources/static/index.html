<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A2A Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --ok:#047857; --warn:#b54708; --danger:#b42318; }
    * { box-sizing:border-box; } body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1180px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    .grid { display:grid; grid-template-columns:340px 1fr; gap:16px; align-items:start; }
    label { display:grid; gap:6px; margin-bottom:10px; font-size:13px; color:var(--muted); }
    input, textarea { border:1px solid var(--line); border-radius:6px; padding:9px 10px; font:inherit; }
    textarea { min-height:110px; resize:vertical; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; margin:0 8px 8px 0; }
    .list { display:grid; gap:10px; }
    .item { border-left:4px solid var(--primary); background:#f8fafc; border-radius:6px; padding:10px; overflow:auto; }
    .item.ok { border-left-color:var(--ok); } .item.warn { border-left-color:var(--warn); } .item.fail { border-left-color:var(--danger); }
    .tag { display:inline-flex; padding:3px 7px; border-radius:999px; background:#e0ecff; color:#1d4ed8; font-size:12px; font-weight:700; margin:4px 4px 0 0; }
    pre { margin:8px 0 0; white-space:pre-wrap; word-break:break-word; font-size:12px; color:#334155; }
    @media (max-width:860px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>A2A Agent Skill</h1>
    <p>页面调用 <code>/api/a2a/card</code>、<code>/api/a2a/tasks</code>、<code>/api/a2a/tasks/{taskId}/events</code> 和补充输入接口，观察 Agent Card、任务状态、事件流、产物和 <code>INPUT_REQUIRED</code>。</p>
  </header>

  <div class="grid">
    <section>
      <h2>任务输入</h2>
      <label>ticketId <input id="ticketId" value="T-1001"></label>
      <label>question <textarea id="question">客户申请退款但订单已发货怎么办</textarea></label>
      <label><input id="approvalRequired" type="checkbox"> 需要人工确认</label>
      <button id="cardBtn">读取 Agent Card</button>
      <button id="taskBtn">创建任务</button>
      <button id="approveBtn">人工确认继续</button>
    </section>

    <section>
      <h2>任务状态</h2>
      <div id="output" class="list"></div>
    </section>
  </div>
</main>

<script>
  const headers = { 'Content-Type': 'application/json' };
  let currentTaskId = '';
  function escapeHtml(value) {
    return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
  }
  async function request(path, options) {
    const response = await fetch(path, options);
    if (!response.ok) throw new Error(await response.text());
    return response.json();
  }
  function stateClass(state) {
    if (state === 'COMPLETED') return 'ok';
    if (state === 'INPUT_REQUIRED') return 'warn';
    if (state === 'FAILED') return 'fail';
    return '';
  }
  async function renderTask(task) {
    currentTaskId = task.taskId;
    const events = await request(`/api/a2a/tasks/${task.taskId}/events`);
    output.innerHTML = `<div class="item ${stateClass(task.state)}"><strong>${escapeHtml(task.state)}</strong><div><span class="tag">${escapeHtml(task.taskId)}</span><span class="tag">${escapeHtml(task.skillId)}</span></div><pre>${escapeHtml(JSON.stringify(task, null, 2))}</pre></div>`
      + `<div class="item"><strong>events</strong><pre>${escapeHtml(JSON.stringify(events, null, 2))}</pre></div>`;
  }
  cardBtn.addEventListener('click', async () => {
    try {
      const data = await request('/api/a2a/card');
      output.innerHTML = `<div class="item ok"><strong>${escapeHtml(data.name)}</strong><div>${data.skills.map(skill => `<span class="tag">${escapeHtml(skill.id)}</span>`).join('')}</div><pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre></div>`;
    } catch (error) {
      output.innerHTML = `<div class="item fail">${escapeHtml(error.message)}</div>`;
    }
  });
  taskBtn.addEventListener('click', async () => {
    try {
      const task = await request('/api/a2a/tasks', {
        method:'POST',
        headers,
        body:JSON.stringify({
          skillId:'ticket.advice',
          input:{ ticketId:ticketId.value, question:question.value, approvalRequired:approvalRequired.checked }
        })
      });
      await renderTask(task);
    } catch (error) {
      output.innerHTML = `<div class="item fail">${escapeHtml(error.message)}</div>`;
    }
  });
  approveBtn.addEventListener('click', async () => {
    if (!currentTaskId) return;
    try {
      const task = await request(`/api/a2a/tasks/${currentTaskId}/input`, { method:'POST', headers, body:JSON.stringify({ approved:true }) });
      await renderTask(task);
    } catch (error) {
      output.innerHTML = `<div class="item fail">${escapeHtml(error.message)}</div>`;
    }
  });
  cardBtn.click();
</script>
</body>
</html>
