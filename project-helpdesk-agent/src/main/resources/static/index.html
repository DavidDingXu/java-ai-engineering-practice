<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工单 AI 助手 Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --danger:#b42318; --green:#047857; }
    * { box-sizing:border-box; } body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1200px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    .grid { display:grid; grid-template-columns:340px 1fr; gap:16px; align-items:start; }
    label { display:grid; gap:6px; margin-bottom:10px; font-size:13px; color:var(--muted); }
    input, textarea { border:1px solid var(--line); border-radius:6px; padding:9px 10px; font:inherit; }
    textarea { min-height:110px; resize:vertical; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; margin:0 8px 8px 0; }
    button.secondary { background:#475467; }
    .cards { display:grid; gap:10px; }
    .card { border:1px solid var(--line); border-radius:8px; padding:14px; background:#fbfdff; white-space:pre-wrap; line-height:1.7; }
    .risk { display:inline-flex; padding:4px 8px; border-radius:999px; background:#fef3f2; color:var(--danger); font-weight:700; }
    .trace { border-left:4px solid var(--primary); }
    .tool { border-left:4px solid var(--green); }
    @media (max-width:860px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>工单 AI 助手</h1>
    <p>页面调用 <code>/api/helpdesk-agent/scenarios/refund</code>、<code>/api/helpdesk-agent/advice</code> 和关闭工单接口，展示 RAG、Tool、人工确认、审计与 Trace 的完整业务流。</p>
  </header>

  <div class="grid">
    <section>
      <h2>工单上下文</h2>
      <label>ticketId <input id="ticketId" value="T-1001"></label>
      <label>userId <input id="userId" value="u1001"></label>
      <label>tenantId <input id="tenantId" value="tenant-a"></label>
      <label>department <input id="department" value="support"></label>
      <label>question <textarea id="question">客户申请退款，但订单已经发货，应该怎么处理？</textarea></label>
      <label>confirmationToken <input id="confirmationToken" value="confirm-close-1001"></label>
      <button id="scenarioBtn">加载完整场景</button>
      <button id="adviceBtn">生成建议</button>
      <button class="secondary" id="closeBlockedBtn">未确认关闭</button>
      <button id="closeBtn">确认后关闭</button>
    </section>

    <section>
      <h2>处理台</h2>
      <div id="cards" class="cards"></div>
    </section>
  </div>
</main>

<script>
  const cards = document.querySelector('#cards');
  const headers = { 'Content-Type': 'application/json' };
  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }
  function card(content, cls = '') { return `<div class="card ${cls}">${escapeHtml(content)}</div>`; }
  function riskCard(riskLevel, action, adviceText) {
    return `<div class="card"><span class="risk">${escapeHtml(riskLevel)} / ${escapeHtml(action)}</span>

${escapeHtml(adviceText)}</div>`;
  }
  function body(extra = {}) {
    return { ticketId: ticketId.value, userId: userId.value, tenantId: tenantId.value, department: department.value, ...extra };
  }
  async function post(path, payload) {
    const response = await fetch(path, { method:'POST', headers, body: JSON.stringify(payload) });
    if (!response.ok) throw new Error(await response.text());
    return response.json();
  }
  async function scenario() {
    const data = await (await fetch('/api/helpdesk-agent/scenarios/refund')).json();
    cards.innerHTML = card(`示例工单：${data.ticketId}
风险：${data.riskLevel}
动作：${data.requiredAction}
引用：${data.citationDocumentIds.join(', ')}
Tool：${data.toolNames.join(' -> ')}
Trace：${data.traceStepNames.join(' -> ')}`);
  }
  async function advice() {
    const data = await post('/api/helpdesk-agent/advice', body({ question: question.value }));
    cards.innerHTML = riskCard(data.riskLevel, data.requiredAction, data.advice)
      + (data.citations || []).map(c => card(`${c.documentId}
${c.quote}`, 'tool')).join('')
      + (data.toolRecords || []).map(r => card(`${r.toolName}: ${r.message}`, 'tool')).join('')
      + (data.trace?.steps || []).map(s => card(`${s.name}
${JSON.stringify(s.attributes || {}, null, 2)}`, 'trace')).join('');
  }
  async function closeTicket(approved) {
    const data = await post('/api/helpdesk-agent/tickets/close', body({
      humanApproved: approved,
      confirmationToken: approved ? confirmationToken.value : ''
    }));
    cards.innerHTML += card(`关闭结果：${data.success ? 'SUCCESS' : 'BLOCKED'}
${data.message}
${JSON.stringify(data.data, null, 2)}`);
  }
  scenarioBtn.addEventListener('click', () => scenario().catch(e => cards.innerHTML = card(e.message)));
  adviceBtn.addEventListener('click', () => advice().catch(e => cards.innerHTML = card(e.message)));
  closeBlockedBtn.addEventListener('click', () => closeTicket(false).catch(e => cards.innerHTML = card(e.message)));
  closeBtn.addEventListener('click', () => closeTicket(true).catch(e => cards.innerHTML = card(e.message)));
</script>
</body>
</html>
