<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>流式输出 Demo</title>
  <style>
    :root { color-scheme: light; --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --ok:#047857; --warn:#b45309; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    main { width: min(1120px, calc(100vw - 32px)); margin: 28px auto; display: grid; gap: 16px; }
    header, section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    label { display: grid; gap: 6px; font-size: 13px; color: var(--muted); }
    input { min-height: 38px; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font: inherit; }
    button { border: 0; border-radius: 6px; padding: 9px 13px; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; }
    button.secondary { background: #475467; }
    .grid { display: grid; grid-template-columns: 280px 1fr; gap: 16px; align-items: start; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .answer { min-height: 220px; border: 1px solid var(--line); border-radius: 8px; padding: 16px; background: #fbfdff; white-space: pre-wrap; line-height: 1.8; }
    .cursor::after { content: "|"; color: var(--primary); animation: blink 1s step-end infinite; }
    .meta { display: grid; gap: 8px; font-size: 13px; color: var(--muted); }
    .events { display: grid; gap: 8px; max-height: 260px; overflow: auto; }
    .event { border-left: 4px solid var(--primary); background: #f8fafc; padding: 8px 10px; border-radius: 6px; font-size: 13px; }
    .done { border-left-color: var(--ok); }
    .error { border-left-color: #dc2626; color: #b42318; }
    code { color: #334155; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (max-width: 780px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>流式输出</h1>
    <p>页面直接连接 <code>/api/stream/ticket-advice</code>，用 SSE 把 token 逐字显示出来，并保留事件 ID 观察断连恢复边界。</p>
  </header>

  <div class="grid">
    <section>
      <h2>会话</h2>
      <label>sessionId
        <input id="sessionId" value="s1001">
      </label>
      <label>lastEventId（可选）
        <input id="lastEventIdInput" placeholder="例如 s1001-2">
      </label>
      <div class="actions">
        <button id="startBtn">开始流式输出</button>
        <button class="secondary" id="stopBtn">断开</button>
      </div>
      <div class="meta" style="margin-top:14px">
        <span>状态：<strong id="status">未连接</strong></span>
        <span>事件数：<strong id="count">0</strong></span>
        <span>最后事件 ID：<strong id="lastEventId">-</strong></span>
        <span>恢复输入：<strong id="resumeHint">-</strong></span>
      </div>
    </section>

    <section>
      <h2>逐字显示</h2>
      <div id="answer" class="answer cursor"></div>
    </section>
  </div>

  <section>
    <h2>事件流</h2>
    <div id="events" class="events"></div>
  </section>
</main>

<script>
  const answer = document.querySelector('#answer');
  const events = document.querySelector('#events');
  const statusText = document.querySelector('#status');
  const countText = document.querySelector('#count');
  const lastEventId = document.querySelector('#lastEventId');
  const resumeHint = document.querySelector('#resumeHint');
  let source;
  let count = 0;

  function appendEvent(type, text, eventId) {
    count += 1;
    countText.textContent = count;
    if (eventId) {
      lastEventId.textContent = eventId;
      resumeHint.textContent = eventId;
      document.querySelector('#lastEventIdInput').value = eventId;
    }
    const row = document.createElement('div');
    row.className = `event ${type}`;
    row.textContent = `${type.toUpperCase()} #${eventId || '-'}  ${text}`;
    events.prepend(row);
  }

  function start() {
    if (source) source.close();
    answer.textContent = '';
    answer.classList.add('cursor');
    events.textContent = '';
    count = 0;
    countText.textContent = '0';
    lastEventId.textContent = '-';
    resumeHint.textContent = '-';
    const sessionId = document.querySelector('#sessionId').value.trim() || 's1001';
    const lastEventIdValue = document.querySelector('#lastEventIdInput').value.trim();
    const params = new URLSearchParams({ sessionId });
    if (lastEventIdValue) {
      params.set('lastEventId', lastEventIdValue);
    }
    source = new EventSource(`/api/stream/ticket-advice?${params}`);
    statusText.textContent = '连接中';

    source.addEventListener('open', () => { statusText.textContent = '接收中'; });
    source.addEventListener('token', event => {
      answer.textContent += event.data;
      appendEvent('token', event.data, event.lastEventId);
    });
    source.addEventListener('done', event => {
      statusText.textContent = '完成';
      answer.classList.remove('cursor');
      appendEvent('done', event.data, event.lastEventId);
      source.close();
    });
    source.addEventListener('error', () => {
      statusText.textContent = '已断开';
      appendEvent('error', '连接中断，可重新开始观察恢复行为', lastEventId.textContent);
      source.close();
    });
  }

  document.querySelector('#startBtn').addEventListener('click', start);
  document.querySelector('#stopBtn').addEventListener('click', () => {
    if (source) source.close();
    statusText.textContent = '手动断开';
    resumeHint.textContent = lastEventId.textContent;
  });
</script>
</body>
</html>
