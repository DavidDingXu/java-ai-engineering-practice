<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tool API Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --danger:#b42318; --ok:#047857; }
    * { box-sizing:border-box; } body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1180px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    .grid { display:grid; grid-template-columns:320px 1fr; gap:16px; align-items:start; }
    label { display:grid; gap:6px; margin-bottom:10px; font-size:13px; color:var(--muted); }
    input { border:1px solid var(--line); border-radius:6px; padding:9px 10px; font:inherit; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; margin:0 8px 8px 0; }
    button.secondary { background:#475467; }
    .result { border:1px solid var(--line); border-radius:8px; padding:14px; background:#fbfdff; min-height:100px; white-space:pre-wrap; line-height:1.7; }
    .ledger { display:grid; gap:10px; margin-top:12px; max-height:320px; overflow:auto; }
    .record { border-left:4px solid var(--ok); background:#f8fafc; border-radius:6px; padding:10px; font-size:13px; }
    .record.fail { border-left-color:var(--danger); }
    @media (max-width:820px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>Tool API 写操作边界</h1>
    <p>页面调用 <code>/api/tools/ticket/lookup</code>、<code>/api/tools/ticket/close</code> 和 <code>/api/tools/ledger</code>，展示查询类 Tool、写操作人工确认、幂等 token 与审计记录。</p>
  </header>

  <div class="grid">
    <section>
      <h2>操作参数</h2>
      <label>ticketId <input id="ticketId" value="T-1001"></label>
      <label>userId <input id="userId" value="u1001"></label>
      <label>tenantId <input id="tenantId" value="tenant-a"></label>
      <label>department <input id="department" value="support"></label>
      <label>confirmationToken <input id="confirmationToken" value="confirm-close-1001"></label>
      <button id="lookupBtn">查询工单</button>
      <button class="secondary" id="closeWithoutBtn">无确认关闭</button>
      <button id="closeBtn">人工确认关闭</button>
    </section>

    <section>
      <h2>执行结果</h2>
      <div id="result" class="result"></div>
      <h2 style="margin-top:16px">审计 Ledger</h2>
      <div id="ledger" class="ledger"></div>
    </section>
  </div>
</main>

<script>
  const result = document.querySelector('#result');
  const ledger = document.querySelector('#ledger');
  const headers = { 'Content-Type': 'application/json' };
  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function operator() {
    return { userId: userId.value, tenantId: tenantId.value, department: department.value };
  }

  async function postTool(path, body) {
    const response = await fetch(path, { method: 'POST', headers, body: JSON.stringify(body) });
    if (!response.ok) throw new Error(await response.text());
    const data = await response.json();
    result.textContent = JSON.stringify(data, null, 2);
    await loadLedger();
  }

  async function loadLedger() {
    const response = await fetch('/api/tools/ledger');
    const rows = await response.json();
    ledger.innerHTML = rows.slice().reverse().map(row => `
      <div class="record ${row.success ? '' : 'fail'}">
        <strong>${escapeHtml(row.toolName)}</strong> ${row.success ? 'SUCCESS' : 'BLOCKED'}<br>
        ${escapeHtml(row.message)}<br>
        操作人：${escapeHtml(row.userId)} / ${escapeHtml(row.tenantId)}
      </div>
    `).join('');
  }

  lookupBtn.addEventListener('click', () => postTool('/api/tools/ticket/lookup', { ticketId: ticketId.value, operator: operator() }).catch(e => result.textContent = e.message));
  closeWithoutBtn.addEventListener('click', () => postTool('/api/tools/ticket/close', { ticketId: ticketId.value, humanApproved: false, operator: operator() }).catch(e => result.textContent = e.message));
  closeBtn.addEventListener('click', () => postTool('/api/tools/ticket/close', { ticketId: ticketId.value, humanApproved: true, confirmationToken: confirmationToken.value, operator: operator() }).catch(e => result.textContent = e.message));
  loadLedger();
</script>
</body>
</html>
