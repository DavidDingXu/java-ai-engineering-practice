<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>企业制度知识库 Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --green:#047857; }
    * { box-sizing:border-box; } body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1200px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    .grid { display:grid; grid-template-columns:360px 1fr; gap:16px; align-items:start; }
    label { display:grid; gap:6px; margin-bottom:10px; font-size:13px; color:var(--muted); }
    input, textarea { border:1px solid var(--line); border-radius:6px; padding:9px 10px; font:inherit; }
    textarea { min-height:150px; resize:vertical; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; margin:0 8px 8px 0; }
    .cards { display:grid; gap:10px; }
    .card { border:1px solid var(--line); border-radius:8px; padding:14px; background:#fbfdff; white-space:pre-wrap; line-height:1.7; }
    .citation { border-left:4px solid var(--green); }
    .trace { border-left:4px solid var(--primary); font-size:13px; }
    @media (max-width:880px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>企业制度知识库</h1>
    <p>页面调用 <code>/api/enterprise-rag/documents</code>、<code>/api/enterprise-rag/answers</code> 和评测接口，完整演示上传制度、切分索引、带引用回答和 RAG Eval。</p>
  </header>

  <div class="grid">
    <section>
      <h2>制度文档</h2>
      <label>documentId <input id="documentId" value="refund-policy-2026"></label>
      <label>tenantId <input id="tenantId" value="tenant-a"></label>
      <label>department <input id="department" value="support"></label>
      <label>question <textarea id="question">客户申请退款但订单已发货怎么办</textarea></label>
      <label>content <textarea id="content">退款制度
发货后退款需先核对物流状态。
高金额退款必须转人工复核。</textarea></label>
      <button id="uploadBtn">上传并索引</button>
      <button id="askBtn">问知识库</button>
      <button id="evalBtn">运行评测</button>
    </section>

    <section>
      <h2>问答、引用与 Trace</h2>
      <div id="cards" class="cards"></div>
    </section>
  </div>
</main>

<script>
  const cards = document.querySelector('#cards');
  const headers = { 'Content-Type': 'application/json' };
  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }
  function card(content, cls = '') { return `<div class="card ${cls}">${escapeHtml(content)}</div>`; }
  async function post(path, body) {
    const response = await fetch(path, { method:'POST', headers, body: JSON.stringify(body) });
    if (!response.ok) throw new Error(await response.text());
    return response.json();
  }
  async function upload() {
    const data = await post('/api/enterprise-rag/documents', {
      documentId: documentId.value,
      tenantId: tenantId.value,
      departments: [department.value],
      type: 'POLICY',
      content: content.value
    });
    cards.innerHTML = card(`索引完成：${data.documentId} v${data.documentVersion}
状态：${data.status}
chunkCount：${data.chunkCount}`);
  }
  async function ask() {
    await upload();
    const data = await post('/api/enterprise-rag/answers', {
      question: question.value,
      tenantId: tenantId.value,
      department: department.value
    });
    cards.innerHTML += card(data.content)
      + (data.citations || []).map(c => card(`${c.documentId} / ${c.chunkId}
${c.quote}`, 'citation')).join('')
      + (data.trace?.steps || []).map(s => card(`${s.name}: ${s.detail}`, 'trace')).join('');
  }
  async function evaluate() {
    await upload();
    const data = await post('/api/enterprise-rag/eval', [{
      caseId:'E-001',
      question: question.value,
      tenantId: tenantId.value,
      department: department.value,
      expectedDocumentId: documentId.value
    }]);
    cards.innerHTML += card(`Eval
caseCount：${data.caseCount}
retrievalHitRate：${data.retrievalHitRate}
citationHitRate：${data.citationHitRate}`);
  }
  uploadBtn.addEventListener('click', () => upload().catch(e => cards.innerHTML = card(e.message)));
  askBtn.addEventListener('click', () => ask().catch(e => cards.innerHTML = card(e.message)));
  evalBtn.addEventListener('click', () => evaluate().catch(e => cards.innerHTML = card(e.message)));
</script>
</body>
</html>
