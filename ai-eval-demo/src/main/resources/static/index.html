<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eval Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --ok:#047857; --danger:#b42318; --amber:#b54708; }
    * { box-sizing:border-box; } body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1220px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; margin:0 8px 8px 0; }
    .metrics { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:10px; }
    .metric { border:1px solid var(--line); border-radius:8px; padding:14px; background:#fbfdff; }
    .metric span { display:block; color:var(--muted); font-size:12px; margin-bottom:4px; }
    .buttons { display:flex; flex-wrap:wrap; gap:8px; }
    .results { display:grid; gap:10px; margin-top:12px; }
    .row { border-left:4px solid var(--ok); background:#f8fafc; border-radius:6px; padding:10px; overflow:auto; }
    .row.fail { border-left-color:var(--danger); } .row.warn { border-left-color:var(--amber); }
    pre { margin:8px 0 0; white-space:pre-wrap; word-break:break-word; font-size:12px; color:#334155; }
    @media (max-width:820px) { .metrics { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>Eval 评测</h1>
    <p>页面调用基础回答、RAG、Agent、Judge 校准、Prompt 回归和 Harness 对比接口，把通过率、证据命中、路径命中和候选策略是否可发布展示成可读结果。</p>
  </header>

  <section>
    <h2>运行评测集</h2>
    <div class="buttons">
      <button id="basicBtn">基础回答评测</button>
      <button id="ragBtn">RAG 引用评测</button>
      <button id="agentBtn">Agent 路径评测</button>
      <button id="judgeBtn">Judge 校准</button>
      <button id="promptBtn">Prompt 回归</button>
      <button id="harnessBtn">Harness 对比</button>
    </div>
  </section>

  <section>
    <h2>通过率</h2>
    <div class="metrics">
      <div class="metric"><span>类型</span><strong id="kind">-</strong></div>
      <div class="metric"><span>总数</span><strong id="total">-</strong></div>
      <div class="metric"><span>通过率 / 一致率</span><strong id="rate">-</strong></div>
      <div class="metric"><span>关键计数</span><strong id="extra">-</strong></div>
    </div>
    <div id="results" class="results"></div>
  </section>
</main>

<script>
  const headers = { 'Content-Type': 'application/json' };
  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }
  function resultPassed(row) {
    if ('passed' in row) return row.passed;
    if ('promotable' in row) return row.promotable;
    if ('agreed' in row) return row.agreed && !row.lowConfidence;
    return true;
  }
  function render(kindText, data, extraText) {
    kind.textContent = kindText;
    total.textContent = data.total;
    rate.textContent = data.passRate ?? data.agreementRate ?? '-';
    extra.textContent = extraText;
    results.innerHTML = (data.results || []).map(row => `
      <div class="row ${resultPassed(row) ? '' : 'fail'}">
        <strong>${escapeHtml(row.caseId || row.promptKey || row.scenario || '-')}</strong><br>
        ${escapeHtml(row.reason || JSON.stringify(row))}
        <pre>${escapeHtml(JSON.stringify(row, null, 2))}</pre>
      </div>
    `).join('');
  }
  async function post(path, body) {
    const response = await fetch(path, { method:'POST', headers, body: JSON.stringify(body) });
    if (!response.ok) throw new Error(await response.text());
    return response.json();
  }
  basicBtn.addEventListener('click', async () => {
    const data = await post('/api/eval/run', [{ caseId:'E-001', question:'发货后退款怎么处理', expectedKeyword:'核对物流', actualAnswer:'建议先核对物流状态，再转人工复核。' }]);
    render('Basic', data, `passed=${data.passed}`);
  });
  ragBtn.addEventListener('click', async () => {
    const data = await post('/api/eval/rag/run', {
      cases:[{ caseId:'R-001', question:'发货后退款怎么办', expectedChunkIds:['refund-policy-001-c1'], expectNoEvidence:false }],
      observations:[{ caseId:'R-001', retrievedChunkIds:['refund-policy-001-c1'], citedChunkIds:['refund-policy-001-c1'], noEvidenceReturned:false, answer:'发货后先核对物流状态。' }]
    });
    render('RAG', data, `retrieval=${data.retrievalPassed}, citation=${data.citationPassed}`);
  });
  agentBtn.addEventListener('click', async () => {
    const data = await post('/api/eval/agent/run', {
      cases:[{ caseId:'A-001', question:'关闭高风险退款工单', expectedToolPath:['ticket.lookup','order.lookup','policy.search'], expectHumanApproval:true }],
      observations:[{ caseId:'A-001', actualToolPath:['ticket.lookup','order.lookup','policy.search'], humanApprovalRequested:true, riskLevel:'HIGH' }]
    });
    render('Agent', data, `path=${data.pathPassed}, approval=${data.approvalPassed}`);
  });
  judgeBtn.addEventListener('click', async () => {
    const data = await post('/api/eval/judge/calibrate', [
      { caseId:'J-001', question:'发货后退款是否通过', humanPassed:true, judgePassed:true, judgeConfidence:0.91, note:'人工和裁判一致' },
      { caseId:'J-002', question:'无证据回答是否通过', humanPassed:false, judgePassed:true, judgeConfidence:0.62, note:'需要人工复盘' }
    ]);
    render('Judge', data, `agreed=${data.agreed}, lowConfidence=${data.lowConfidence}`);
  });
  promptBtn.addEventListener('click', async () => {
    const data = await post('/api/eval/prompt/regression', [
      { caseId:'P-001', promptKey:'refund-advice', baselineVersion:'v1', candidateVersion:'v2', baselinePassRate:0.86, candidatePassRate:0.88, tolerance:0.02 },
      { caseId:'P-002', promptKey:'risk-check', baselineVersion:'v1', candidateVersion:'v2', baselinePassRate:0.90, candidatePassRate:0.81, tolerance:0.03 }
    ]);
    render('Prompt', data, `regressions=${data.regressions}`);
  });
  harnessBtn.addEventListener('click', async () => {
    const data = await post('/api/eval/harness/run', {
      cases:[{ caseId:'H-001', scenario:'hybrid-rag', minQualityImprovement:0.05, maxCostIncreaseRate:0.30, maxLatencyIncreaseRate:0.30 }],
      observations:[
        { caseId:'H-001', strategy:'baseline', qualityScore:0.72, costUnits:100, latencyMillis:800 },
        { caseId:'H-001', strategy:'candidate', qualityScore:0.82, costUnits:118, latencyMillis:920 }
      ]
    });
    render('Harness', data, `promotable=${data.promotableCandidates}`);
  });
  basicBtn.click();
</script>
</body>
</html>
