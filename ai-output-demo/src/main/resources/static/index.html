<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>结构化输出 Demo</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --line:#d8dee8; --text:#172033; --muted:#667085; --primary:#2563eb; --danger:#b42318; --ok:#047857; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    main { width:min(1180px, calc(100vw - 32px)); margin:28px auto; display:grid; gap:16px; }
    header, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    h1 { margin:0 0 6px; font-size:24px; } h2 { margin:0 0 12px; font-size:17px; }
    p { margin:0; color:var(--muted); line-height:1.7; } code { color:#334155; }
    textarea { width:100%; min-height:260px; resize:vertical; border:1px solid var(--line); border-radius:6px; padding:12px; font:14px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; }
    button { border:0; border-radius:6px; padding:9px 13px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
    .cards { display:grid; gap:12px; }
    .card { border:1px solid var(--line); border-radius:8px; padding:14px; background:#fbfdff; }
    .label { font-size:12px; color:var(--muted); margin-bottom:6px; }
    .risk { display:inline-flex; padding:4px 8px; border-radius:999px; background:#fff7ed; color:#9a3412; font-weight:700; }
    ul { margin:8px 0 0; padding-left:18px; line-height:1.7; }
    .error { color:var(--danger); white-space:pre-wrap; }
    @media (max-width:820px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>结构化输出</h1>
    <p>页面调用 <code>/api/output/ticket-advice/parse</code>，把模型 JSON 解析成工单建议卡片，并展示风险等级、下一步动作和引用。</p>
  </header>

  <div class="grid">
    <section>
      <h2>模型输出 JSON</h2>
      <textarea id="raw">{
  "summary": "客户申请退款但订单已经发货",
  "riskLevel": "MEDIUM",
  "nextActions": ["核对物流状态", "转人工复核"],
  "citations": ["refund-policy-001"]
}</textarea>
      <button id="parseBtn" style="margin-top:12px">解析为业务对象</button>
    </section>

    <section>
      <h2>工单处理建议</h2>
      <div id="result" class="cards"></div>
    </section>
  </div>
</main>

<script>
  const result = document.querySelector('#result');

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function list(items) {
    return `<ul>${(items || []).map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
  }

  async function parseOutput() {
    result.innerHTML = '<div class="card">解析中...</div>';
    try {
      const response = await fetch('/api/output/ticket-advice/parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: document.querySelector('#raw').value
      });
      if (!response.ok) throw new Error(await response.text());
      const data = await response.json();
      result.innerHTML = `
        <div class="card"><div class="label">摘要</div><strong>${escapeHtml(data.summary)}</strong></div>
        <div class="card"><div class="label">风险等级</div><span class="risk">${escapeHtml(data.riskLevel)}</span></div>
        <div class="card"><div class="label">下一步动作</div>${list(data.nextActions)}</div>
        <div class="card"><div class="label">引用依据</div>${list(data.citations)}</div>
      `;
    } catch (error) {
      result.innerHTML = `<div class="card error">${escapeHtml(error.message)}</div>`;
    }
  }

  document.querySelector('#parseBtn').addEventListener('click', parseOutput);
  parseOutput();
</script>
</body>
</html>
